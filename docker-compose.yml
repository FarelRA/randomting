version: '3.8'

services:
  randomting:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - NUXT_SOCKET_PORT=3002
      - DB_URL=file:./data/sqlite.db
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
    volumes:
      - randomting-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  randomting-data:
