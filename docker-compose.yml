version: '3.8'

services:
  randomting:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
      - "3101:3101"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3100
      - SOCKET_PORT=3101
      - DB_URL=file:./data/sqlite.db
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
    volumes:
      - randomting-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3100/api/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  randomting-data:
